services:
  # ─── Backend API (Express + SQLite) ──────────────────────
  - type: web
    name: smartroute-backend
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: smartroute-frontend
          type: web
          property: host
    healthCheckPath: /api/health

  # ─── Frontend (Next.js) ─────────────────────────────────
  - type: web
    name: smartroute-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: smartroute-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        value: ""

  # ─── ML Service (FastAPI + Python) ──────────────────────
  - type: web
    name: smartroute-ml
    runtime: docker
    region: oregon
    plan: free
    rootDir: ml-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
